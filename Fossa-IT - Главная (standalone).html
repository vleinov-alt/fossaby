document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(\"df9b0c9d-3cfa-4887-86fb-5f2ad27e3d94\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"30399d07-a716-4f97-9a95-a6469c0f66f7\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"799d6935-f785-4ad5-83e7-27f9d1ed508c\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e96222c4-6b34-4e9d-a2e6-62b3f0a098a1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Onest';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"df9b0c9d-3cfa-4887-86fb-5f2ad27e3d94\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Fossa-IT — design system\n   Derived from the Fossa-IT logo: ink mask #101418,\n   leaf greens #68B42D / #20A538. FossaMed tint: #12937B.\n   Type: Onest (grotesque, full Cyrillic) + JetBrains Mono.\n   ============================================================ */\n\n:root{\n  --ink:#101418;\n  --ink-2:#2A3138;\n  --txt:#1C2228;\n  --mut:#5B6470;\n  --mut-2:#8A929C;\n  --line:#E4E8E2;\n  --line-2:#D3DACF;\n  --bg:#FFFFFF;\n  --soft:#F4F7F1;\n  --soft-2:#EDF2E8;\n  --acc:#68B42D;\n  --acc-2:#20A538;\n  --acc-deep:#3F7A18;\n  --acc-soft:#EAF5DF;\n  --acc-on-dark:#8FD650;\n  --med:#12937B;\n  --med-deep:#0B6E5C;\n  --med-soft:#E3F2EE;\n  --med-on-dark:#4FC9B0;\n  --r-card:16px;\n  --r-input:12px;\n  --r-chip:8px;\n  --shadow:0 12px 32px rgba(16,20,24,.07);\n  --ease:cubic-bezier(.2,.7,.2,1);\n  --font:'Onest',system-ui,-apple-system,'Segoe UI',sans-serif;\n  --mono:'JetBrains Mono',ui-monospace,monospace;\n  --maxw:1200px;\n}\n\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{\n  font-family:var(--font);\n  font-size:17px;line-height:1.65;\n  color:var(--txt);background:var(--bg);\n  -webkit-font-smoothing:antialiased;\n}\nimg{max-width:100%;display:block;}\na{color:inherit;text-decoration:none;}\nbutton{font:inherit;cursor:pointer;}\n::selection{background:var(--acc);color:var(--ink);}\n\n:focus-visible{outline:2px solid var(--acc-2);outline-offset:2px;border-radius:4px;}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}\n\n/* ---------- type ---------- */\nh1,h2,h3,h4{font-weight:700;color:var(--ink);line-height:1.12;letter-spacing:-.02em;text-wrap:balance;}\n.h-hero{font-size:clamp(34px,4.6vw,58px);font-weight:800;}\n.h-xl{font-size:clamp(30px,3.8vw,46px);font-weight:800;}\nh2{font-size:clamp(26px,3vw,36px);}\nh3{font-size:21px;letter-spacing:-.01em;}\n.lead{font-size:clamp(17px,1.6vw,20px);color:var(--mut);line-height:1.6;max-width:60ch;text-wrap:pretty;}\n.eyebrow{\n  font-family:var(--mono);font-size:12.5px;font-weight:500;\n  letter-spacing:.14em;text-transform:uppercase;color:var(--acc-deep);\n  display:flex;align-items:center;gap:10px;\n}\n.eyebrow::before{content:\"\";width:22px;height:2px;background:var(--acc);border-radius:2px;}\n.eyebrow.on-dark{color:var(--acc-on-dark);}\n.eyebrow.med{color:var(--med);}\n.eyebrow.med::before{background:var(--med);}\n.mono{font-family:var(--mono);}\n\n/* ---------- header ---------- */\n.site-header{\n  position:sticky;top:0;z-index:60;\n  background:rgba(255,255,255,.86);\n  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);\n  border-bottom:1px solid var(--line);\n}\n.nav{display:flex;align-items:center;gap:28px;height:72px;}\n.brand{display:flex;align-items:center;gap:11px;font-weight:800;font-size:19px;color:var(--ink);letter-spacing:-.02em;white-space:nowrap;}\n.brand img{width:34px;height:34px;}\n.brand .tld{color:var(--mut-2);font-weight:600;}\n.nav-links{display:flex;align-items:center;gap:4px;list-style:none;margin-left:12px;}\n.nav-links > li{position:relative;}\n.nav-links a,.nav-links .nav-drop-btn{\n  display:flex;align-items:center;gap:6px;\n  padding:9px 14px;border-radius:10px;border:0;background:none;\n  font-size:15.5px;font-weight:500;color:var(--ink-2);\n  transition:background .12s var(--ease),color .12s var(--ease);\n}\n.nav-links a:hover,.nav-drop-btn:hover{background:var(--soft);color:var(--ink);}\n.nav-links a[aria-current=\"page\"]{color:var(--acc-deep);font-weight:600;}\n.nav-drop-btn svg{transition:transform .2s var(--ease);}\n.nav-drop{position:relative;}\n.nav-drop-menu{\n  position:absolute;top:calc(100% + 8px);left:0;min-width:300px;\n  background:#fff;border:1px solid var(--line);border-radius:14px;\n  box-shadow:var(--shadow);padding:8px;list-style:none;\n  opacity:0;transform:translateY(-6px);pointer-events:none;\n  transition:opacity .2s var(--ease),transform .2s var(--ease);\n}\n.nav-drop.open .nav-drop-menu{opacity:1;transform:none;pointer-events:auto;}\n.nav-drop.open .nav-drop-btn svg{transform:rotate(180deg);}\n.nav-drop-menu a{display:block;padding:10px 12px;border-radius:10px;}\n.nav-drop-menu a strong{display:block;font-weight:600;color:var(--ink);font-size:15px;}\n.nav-drop-menu a span{display:block;font-size:13.5px;color:var(--mut);line-height:1.45;}\n.nav-spacer{flex:1;}\n.lang-toggle{\n  border:1px solid var(--line-2);background:none;border-radius:10px;\n  font-family:var(--mono);font-size:12.5px;font-weight:500;color:var(--mut);\n  padding:8px 12px;transition:all .12s var(--ease);\n}\n.lang-toggle:hover{border-color:var(--ink);color:var(--ink);}\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:9px;\n  border-radius:12px;border:0;font-weight:600;font-size:16px;\n  padding:14px 26px;color:var(--ink);background:var(--acc);\n  transition:background .15s var(--ease),transform .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease);\n  text-align:center;\n}\n.btn:hover{background:#5AA322;}\n.btn:active{transform:translateY(1px);}\n.btn-dark{background:var(--ink);color:#fff;}\n.btn-dark:hover{background:var(--ink-2);}\n.btn-ghost{background:none;border:1.5px solid var(--line-2);color:var(--ink);}\n.btn-ghost:hover{background:var(--soft);border-color:var(--ink);}\n.btn-ghost.on-dark{border-color:rgba(255,255,255,.28);color:#fff;}\n.btn-ghost.on-dark:hover{background:rgba(255,255,255,.08);border-color:#fff;}\n.btn-med{background:var(--med);color:#fff;}\n.btn-med:hover{background:var(--med-deep);}\n.btn-sm{padding:10px 18px;font-size:15px;border-radius:10px;}\n.btn svg{flex:none;}\n.link-arrow{display:inline-flex;align-items:center;gap:7px;font-weight:600;color:var(--acc-deep);font-size:16px;transition:gap .15s var(--ease);}\n.link-arrow:hover{gap:11px;}\n.link-arrow.med{color:var(--med);}\n\n/* ---------- sections ---------- */\n.section{padding:88px 0;}\n.section.tight{padding:64px 0;}\n.section.soft{background:var(--soft);}\n.section-head{display:flex;flex-direction:column;gap:14px;margin-bottom:48px;max-width:780px;}\n.section-head .lead{margin-top:2px;}\n\n/* dark blocks */\n.dark{background:var(--ink);color:#E8ECEF;}\n.dark h1,.dark h2,.dark h3{color:#fff;}\n.dark .lead{color:#A9B2BB;}\n\n/* ---------- hero ---------- */\n.hero{position:relative;overflow:hidden;padding:96px 0 88px;}\n.hero .lead{margin-top:22px;}\n.hero-cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:36px;}\n.hero-note{margin-top:18px;font-size:14px;color:var(--mut-2);}\n/* leaf-lobe geometry from the logo, as abstract accent */\n.lobes{position:absolute;pointer-events:none;z-index:0;}\n.hero > .wrap{position:relative;z-index:1;}\n\n/* ---------- cards ---------- */\n.grid{display:grid;gap:20px;}\n.grid-2{grid-template-columns:repeat(2,1fr);}\n.grid-3{grid-template-columns:repeat(3,1fr);}\n.grid-4{grid-template-columns:repeat(4,1fr);}\n.card{\n  background:#fff;border:1px solid var(--line);border-radius:var(--r-card);\n  padding:30px;display:flex;flex-direction:column;gap:14px;\n  transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s var(--ease);\n}\n.card.on-soft{border-color:var(--line);}\na.card:hover,.card.hov:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--line-2);}\n.card h3{display:flex;align-items:center;gap:12px;}\n.card p{color:var(--mut);font-size:15.5px;line-height:1.6;}\n.icon-chip{\n  width:46px;height:46px;border-radius:12px;flex:none;\n  display:flex;align-items:center;justify-content:center;\n  background:var(--acc-soft);color:var(--acc-deep);\n}\n.icon-chip.med{background:var(--med-soft);color:var(--med);}\n.icon-chip.dark{background:var(--ink);color:var(--acc-on-dark);}\n.card ul{list-style:none;display:flex;flex-direction:column;gap:9px;}\n.card ul li{display:flex;gap:10px;font-size:15.5px;color:var(--ink-2);line-height:1.5;}\n.card ul li::before{\n  content:\"\";flex:none;width:7px;height:7px;border-radius:50%;\n  background:var(--acc);margin-top:8px;\n}\n.card .card-foot{margin-top:auto;padding-top:6px;}\n\n/* route cards (home) */\n.route-card{padding:34px;gap:16px;position:relative;}\n.route-card .eyebrow{margin-bottom:2px;}\n.route-card h2{font-size:24px;}\n.route-card.med-card ul li::before{background:var(--med);}\n\n/* ---------- tags / chips ---------- */\n.tag{\n  display:inline-flex;align-items:center;gap:6px;\n  font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.04em;\n  padding:5px 11px;border-radius:var(--r-chip);\n  background:var(--soft-2);color:var(--ink-2);border:1px solid var(--line);\n}\n.tag.acc{background:var(--acc-soft);color:var(--acc-deep);border-color:transparent;}\n.tag.med{background:var(--med-soft);color:var(--med-deep);border-color:transparent;}\n.tag-row{display:flex;flex-wrap:wrap;gap:8px;}\n\n/* ---------- metrics ---------- */\n.metric{display:flex;flex-direction:column;gap:4px;}\n.metric b{font-size:clamp(30px,3.2vw,42px);font-weight:800;color:var(--ink);letter-spacing:-.03em;line-height:1.05;}\n.metric b em{font-style:normal;color:var(--acc-2);}\n.metric span{font-size:14.5px;color:var(--mut);line-height:1.45;}\n.dark .metric b{color:#fff;}\n.dark .metric b em{color:var(--acc-on-dark);}\n.dark .metric span{color:#A9B2BB;}\n.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}\n\n/* ---------- steps / timeline ---------- */\n.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;counter-reset:step;}\n.steps.three{grid-template-columns:repeat(3,1fr);}\n.step{position:relative;padding:26px 24px 24px;background:#fff;border:1px solid var(--line);border-radius:var(--r-card);}\n.step-num{\n  font-family:var(--mono);font-size:13px;font-weight:600;color:var(--acc-deep);\n  display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;\n}\n.step-num::after{content:\"\";flex:1;min-width:34px;height:1.5px;background:var(--line-2);}\n.step h3{font-size:18px;margin-bottom:8px;}\n.step p{font-size:15px;color:var(--mut);line-height:1.55;}\n.step .tag{margin-top:12px;}\n\n/* ladder strip */\n.ladder{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:18px;align-items:stretch;}\n.ladder-item{background:#fff;border:1px solid var(--line);border-radius:var(--r-card);padding:24px 26px;}\n.ladder-item .mono{font-size:12px;color:var(--acc-deep);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:8px;}\n.ladder-item strong{display:block;font-size:17px;color:var(--ink);margin-bottom:4px;}\n.ladder-item span{font-size:14.5px;color:var(--mut);line-height:1.5;}\n.ladder-arrow{display:flex;align-items:center;color:var(--acc-2);}\n\n/* ---------- case cards ---------- */\n.case-card{padding:0;overflow:hidden;}\n.case-cover{\n  height:170px;display:flex;align-items:flex-end;padding:20px;position:relative;overflow:hidden;\n}\n.case-cover .tag{position:relative;z-index:1;background:rgba(255,255,255,.92);border-color:transparent;}\n.case-body{padding:24px 26px 28px;display:flex;flex-direction:column;gap:12px;flex:1;}\n.case-body h3{font-size:19px;}\n.case-body p{font-size:15px;}\n.case-metrics{display:flex;gap:22px;margin-top:4px;}\n.case-metrics .metric b{font-size:23px;}\n.case-metrics .metric span{font-size:12.5px;}\n\n/* covers: abstract lobe compositions, one per case */\n.cover-a{background:linear-gradient(135deg,#173E1C,#1E5A26);}\n.cover-b{background:linear-gradient(135deg,#101418,#27313A);}\n.cover-c{background:linear-gradient(135deg,#2E6B14,#68B42D);}\n.cover-d{background:linear-gradient(135deg,#0B6E5C,#12937B);}\n.cover-lobe{position:absolute;border-radius:50%;opacity:.25;background:#fff;}\n\n/* ---------- FAQ ---------- */\n.faq{display:flex;flex-direction:column;gap:12px;max-width:840px;}\n.faq-item{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden;}\n.faq-q{\n  width:100%;display:flex;justify-content:space-between;align-items:center;gap:18px;\n  padding:20px 24px;background:none;border:0;text-align:left;\n  font-size:17px;font-weight:600;color:var(--ink);\n}\n.faq-q svg{flex:none;color:var(--acc-2);transition:transform .25s var(--ease);}\n.faq-item.open .faq-q svg{transform:rotate(45deg);}\n.faq-a{max-height:0;overflow:hidden;transition:max-height .3s var(--ease);}\n.faq-a-in{padding:0 24px 22px;color:var(--mut);font-size:15.5px;line-height:1.65;max-width:70ch;}\n\n/* ---------- forms / conversion ---------- */\n.convert{border-radius:24px;padding:56px;display:grid;grid-template-columns:1.05fr 1fr;gap:56px;align-items:start;}\n.convert .h-xl{font-size:clamp(26px,3vw,38px);}\n.convert-aside p{margin-top:16px;}\n.convert-alt{margin-top:28px;display:flex;flex-direction:column;gap:12px;}\n.form{display:flex;flex-direction:column;gap:16px;}\n.field{display:flex;flex-direction:column;gap:7px;}\n.field label{font-size:14px;font-weight:600;color:var(--ink);}\n.dark .field label{color:#E8ECEF;}\n.field input,.field textarea,.field select{\n  font:inherit;font-size:15.5px;color:var(--ink);\n  border:1px solid var(--line-2);border-radius:var(--r-input);\n  padding:13px 16px;background:#fff;width:100%;\n  transition:border-color .15s var(--ease),box-shadow .15s var(--ease);\n}\n.field textarea{min-height:96px;resize:vertical;}\n.field input:focus,.field textarea:focus,.field select:focus{\n  outline:none;border-color:var(--acc-2);box-shadow:0 0 0 3px rgba(104,180,45,.18);\n}\n.field .err{display:none;font-size:13px;color:#D14040;}\n.field.invalid input,.field.invalid textarea{border-color:#D14040;}\n.field.invalid .err{display:block;}\n.form-foot{font-size:13px;color:var(--mut-2);line-height:1.5;}\n.dark .form-foot{color:#7E8893;}\n.form-foot a{text-decoration:underline;}\n.form-ok{\n  display:none;flex-direction:column;gap:10px;align-items:flex-start;\n  background:var(--acc-soft);border-radius:14px;padding:24px;color:var(--ink);\n}\n.form-ok b{font-size:18px;}\n.form.sent .form-ok{display:flex;}\n.form.sent .form-body{display:none;}\n.dark .form-ok{background:rgba(143,214,80,.14);color:#fff;}\n\n/* ---------- footer ---------- */\n.site-footer{background:var(--ink);color:#A9B2BB;padding:64px 0 36px;font-size:15px;}\n.footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:40px;margin-bottom:48px;}\n.site-footer .brand{color:#fff;margin-bottom:14px;}\n.site-footer h4{color:#fff;font-size:14px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:16px;font-family:var(--mono);}\n.site-footer ul{list-style:none;display:flex;flex-direction:column;gap:10px;}\n.site-footer a:hover{color:#fff;}\n.footer-bottom{\n  border-top:1px solid rgba(255,255,255,.1);padding-top:26px;\n  display:flex;flex-wrap:wrap;gap:18px;justify-content:space-between;\n  font-size:13.5px;color:#7E8893;\n}\n.footer-bottom a:hover{color:#fff;}\n\n/* ---------- browser / device frame ---------- */\n.browser{\n  background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;\n  box-shadow:0 24px 60px rgba(16,20,24,.14);\n}\n.browser-bar{\n  display:flex;align-items:center;gap:8px;padding:10px 14px;\n  background:#F2F4F1;border-bottom:1px solid var(--line);\n}\n.browser-bar i{width:10px;height:10px;border-radius:50%;background:#D9DED4;}\n.browser-url{\n  flex:1;max-width:340px;margin-left:8px;font-family:var(--mono);font-size:11px;color:var(--mut);\n  background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 12px;\n  white-space:nowrap;overflow:hidden;\n}\n\n/* ---------- MIS mock primitives (FossaMed) ---------- */\n.mis{display:flex;background:#FAFBFA;font-size:11px;line-height:1.4;color:#2A3138;pointer-events:none;user-select:none;}\n.mis *{box-sizing:border-box;}\n.mis-side{width:148px;flex:none;background:#0F2E27;color:#CFE8DD;padding:12px 10px;display:flex;flex-direction:column;gap:2px;}\n.mis-side .mis-logo{display:flex;align-items:center;gap:7px;font-weight:700;color:#fff;font-size:12px;padding:4px 8px 12px;}\n.mis-side .mis-logo i{width:16px;height:16px;border-radius:5px;background:var(--med);display:block;}\n.mis-nav{padding:7px 9px;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:11px;}\n.mis-nav.act{background:rgba(255,255,255,.12);color:#fff;font-weight:600;}\n.mis-nav i{width:11px;height:11px;border-radius:3px;background:currentColor;opacity:.5;display:block;flex:none;}\n.mis-main{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-width:0;}\n.mis-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}\n.mis-h{font-weight:700;font-size:13.5px;color:#101418;}\n.mis-btn{background:var(--med);color:#fff;border-radius:7px;padding:5px 10px;font-weight:600;font-size:10px;}\n.mis-btn.ghost{background:#fff;color:#2A3138;border:1px solid #DDE3DD;}\n.mis-card{background:#fff;border:1px solid #E3E8E2;border-radius:10px;padding:10px 12px;}\n.mis-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #EEF1ED;}\n.mis-row:last-child{border-bottom:0;}\n.mis-pill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--med-soft);color:var(--med-deep);white-space:nowrap;}\n.mis-pill.warn{background:#FFF2DC;color:#9A6A14;}\n.mis-pill.gray{background:#EEF1ED;color:#5B6470;}\n.mis-ava{width:18px;height:18px;border-radius:50%;flex:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;}\n.mis-line{height:6px;border-radius:3px;background:#E8ECE7;}\n.mis-mut{color:#7C857F;font-size:10px;}\n\n/* ---------- breadcrumbs ---------- */\n.crumbs{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13.5px;color:var(--mut-2);font-family:var(--mono);}\n.crumbs a:hover{color:var(--ink);}\n.crumbs span.sep{color:var(--line-2);}\n\n/* ---------- reveal ---------- */\n@media (prefers-reduced-motion:no-preference){\n  html.js .rv{opacity:0;transform:translateY(18px);transition:opacity .55s var(--ease),transform .55s var(--ease);}\n  html.js .rv.in{opacity:1;transform:none;}\n  html.js .rv.d1{transition-delay:.07s;}html.js .rv.d2{transition-delay:.14s;}html.js .rv.d3{transition-delay:.21s;}\n}\n\n/* ---------- two-col split ---------- */\n.split{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;}\n.split .lead{margin-top:14px;}\n\n/* checklist */\n.checks{list-style:none;display:flex;flex-direction:column;gap:13px;margin-top:22px;}\n.checks li{display:flex;gap:12px;al
